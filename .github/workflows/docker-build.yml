name: ci

on:
  push:
    branches: 
      - main
    tags:
      - 'v*'
  pull_request:
    branches: 
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      ## SHARED STEPS (always run) ##

      - name: checkout code
        uses: actions/checkout@v4

      - name: detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'migrations/**'
              - 'benches/**'
              - '.sqlx/**'
              - 'justfile'
              - '.github/workflows/**'
            ui:
              - 'ui/src/**'
              - 'ui/public/**'
              - 'ui/package.json'
              - 'ui/package-lock.json'
              - 'ui/tsconfig*.json'
              - 'ui/vite.config.ts'
              - 'ui/eslint.config.*'
              - 'ui/.prettierrc'
              - 'ui/.prettierignore'
              - 'ui/.nvmrc'
              - 'ui/index.html'
              - 'justfile'
              - '.github/workflows/**'

      - name: install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: setup node with nvm
        uses: actions/setup-node@v4
        with:
          node-version-file: 'ui/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: set up rust
        if: github.event_name != 'pull_request' || steps.filter.outputs.rust == 'true'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup --version
          rustc --version
          cargo --version

      - name: cache rust dependencies
        if: github.event_name != 'pull_request' || steps.filter.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2

      ## PR-ONLY STEPS (lightweight checks) ##

      - name: install npm dependencies
        if: github.event_name == 'pull_request' && steps.filter.outputs.ui == 'true'
        run: cd ui && npm ci

      - name: cargo check
        if: github.event_name == 'pull_request' && steps.filter.outputs.rust == 'true'
        run: just cargo-check-ci

      - name: cargo test
        if: github.event_name == 'pull_request' && steps.filter.outputs.rust == 'true'
        run: just cargo-test-ci

      - name: cargo clippy
        if: github.event_name == 'pull_request' && steps.filter.outputs.rust == 'true'
        run: just cargo-clippy-ci

      - name: eslint
        if: github.event_name == 'pull_request' && steps.filter.outputs.ui == 'true'
        run: just lint-ui-ci

      - name: prettier
        if: github.event_name == 'pull_request' && steps.filter.outputs.ui == 'true'
        run: just prettier-check-ui-ci

      - name: tsc type-check
        if: github.event_name == 'pull_request' && steps.filter.outputs.ui == 'true'
        run: just typecheck-ui-ci

      ## MAIN/TAG-ONLY STEPS (full build + publish) ##

      - name: build with just
        if: github.event_name != 'pull_request'
        run: just build-api-ci

      - name: log in to the container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: extract metadata for docker
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: build and push docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
